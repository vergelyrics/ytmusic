<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YouTube Music</title>
  <link rel="icon" href="https://music.youtube.com/img/favicon_144.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=YouTube+Sans:wght@300;400;500;600;700&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/src/styles.css" />
</head>
<body>
  <div id="app">
    <!-- Nav -->
    <nav class="nav" id="nav">
      <div class="nav-left">
        <button class="nav-menu-btn" id="sidebarToggle" aria-label="Menu">
          <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
        </button>
        <a href="/" class="nav-logo">
          <svg class="logo-icon" viewBox="0 0 24 24" width="28" height="28" fill="#FF0000"><path d="M23.495 6.205a3.007 3.007 0 0 0-2.088-2.088c-1.87-.501-9.396-.501-9.396-.501s-7.507-.01-9.396.501A3.007 3.007 0 0 0 .527 6.205a31.247 31.247 0 0 0-.522 5.805 31.247 31.247 0 0 0 .522 5.783 3.007 3.007 0 0 0 2.088 2.088c1.868.502 9.396.502 9.396.502s7.506 0 9.396-.502a3.007 3.007 0 0 0 2.088-2.088 31.247 31.247 0 0 0 .5-5.783 31.247 31.247 0 0 0-.5-5.805zM9.609 15.601V8.408l6.264 3.602z"/></svg>
          <span class="logo-text">Music</span>
        </a>
      </div>
      <div class="nav-center">
        <div class="search-container" id="searchContainer">
          <button class="search-back-btn" id="searchBackBtn" aria-label="Back">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
          </button>
          <div class="search-input-wrap">
            <input type="text" id="searchInput" class="search-input" placeholder="Search songs, albums, artists" autocomplete="off" />
            <button class="search-clear-btn" id="searchClear" aria-label="Clear">
              <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
            </button>
          </div>
          <button class="search-submit-btn" id="searchSubmit" aria-label="Search">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
          </button>
          <div id="searchSuggestions" class="search-suggestions"></div>
        </div>
        <button class="nav-search-icon" id="navSearchIcon" aria-label="Search">
          <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
        </button>
      </div>
      <div class="nav-right">
        <button class="nav-icon-btn" aria-label="Cast">
          <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M21 3H3c-1.1 0-2 .9-2 2v3h2V5h18v14h-7v2h7c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM1 18v3h3c0-1.66-1.34-3-3-3zm0-4v2c2.76 0 5 2.24 5 5h2c0-3.87-3.13-7-7-7zm0-4v2c4.97 0 9 4.03 9 9h2c0-6.08-4.92-11-11-11z"/></svg>
        </button>
      </div>
    </nav>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <nav class="sidebar-nav">
        <a href="/" class="sidebar-item" data-page="home">
          <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
          <span>Home</span>
        </a>
        <a href="/explore" class="sidebar-item" data-page="explore">
          <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M11 9H9V2H7v7H5V2H3v7c0 2.12 1.66 3.84 3.75 3.97V22h2.5v-9.03C11.34 12.84 13 11.12 13 9V2h-2v7zm5-3v8h2.5v8H21V2c-2.76 0-5 2.24-5 4z"/></svg>
          <span>Explore</span>
        </a>
        <a href="/library" class="sidebar-item" data-page="library">
          <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M20 2H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-2 5h-3v5.5c0 1.38-1.12 2.5-2.5 2.5S10 13.88 10 12.5s1.12-2.5 2.5-2.5c.57 0 1.08.19 1.5.5V5h4v2zM4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6z"/></svg>
          <span>Library</span>
        </a>
      </nav>
    </aside>

    <!-- Main Content -->
    <main class="main" id="main">
      <div id="pageContent"></div>
    </main>

    <!-- Player -->
    <div class="player" id="player" style="display:none">
      <div class="player-left">
        <div class="player-thumbnail-wrap">
          <img class="player-thumbnail" id="playerThumb" src="" alt="" />
        </div>
        <div class="player-info">
          <div class="player-title" id="playerTitle"></div>
          <div class="player-artist" id="playerArtist"></div>
        </div>
        <button class="player-like-btn" aria-label="Like">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M16.5 3c-1.74 0-3.41.81-4.5 2.09C10.91 3.81 9.24 3 7.5 3 4.42 3 2 5.42 2 8.5c0 3.78 3.4 6.86 8.55 11.54L12 21.35l1.45-1.32C18.6 15.36 22 12.28 22 8.5 22 5.42 19.58 3 16.5 3zm-4.4 15.55l-.1.1-.1-.1C7.14 14.24 4 11.39 4 8.5 4 6.5 5.5 5 7.5 5c1.54 0 3.04.99 3.57 2.36h1.87C13.46 5.99 14.96 5 16.5 5c2 0 3.5 1.5 3.5 3.5 0 2.89-3.14 5.74-7.9 10.05z"/></svg>
        </button>
      </div>
      <div class="player-center">
        <div class="player-controls">
          <button class="player-btn" id="prevBtn" aria-label="Previous">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
          </button>
          <button class="player-btn player-play-btn" id="playPauseBtn" aria-label="Play/Pause">
            <svg class="icon-play" viewBox="0 0 24 24" width="36" height="36" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
            <svg class="icon-pause" viewBox="0 0 24 24" width="36" height="36" fill="currentColor" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
          </button>
          <button class="player-btn" id="nextBtn" aria-label="Next">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zm2-8.14 4.96 2.14L8 14.14V9.86zM16 6h2v12h-2z"/></svg>
          </button>
        </div>
        <div class="player-progress">
          <span class="player-time" id="currentTime">0:00</span>
          <div class="progress-bar" id="progressBar">
            <div class="progress-fill" id="progressFill"></div>
            <div class="progress-thumb" id="progressThumb"></div>
          </div>
          <span class="player-time" id="totalTime">0:00</span>
        </div>
      </div>
      <div class="player-right">
        <button class="player-btn" id="lyricsBtn" aria-label="Lyrics">
          <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
        </button>
        <button class="player-btn" id="queueBtn" aria-label="Queue">
          <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M3 18h13v-2H3v2zm0-5h10v-2H3v2zm0-7v2h13V6H3zm18 9.59L17.42 12 21 8.41 19.59 7l-5 5 5 5L21 15.59z"/></svg>
        </button>
        <div class="volume-control">
          <button class="player-btn" id="muteBtn" aria-label="Mute">
            <svg class="icon-vol" viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
          </button>
          <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="100" />
        </div>
        <button class="player-btn player-expand-btn" id="expandPlayer" aria-label="Expand">
          <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
        </button>
      </div>
    </div>

    <!-- Expanded Player -->
    <div class="expanded-player" id="expandedPlayer" style="display:none">
      <div class="exp-backdrop" id="expBackdrop"></div>
      <div class="exp-content">
        <button class="exp-close" id="collapsePlayer">
          <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M19 11H7.83l4.88-4.88c.39-.39.39-1.03 0-1.42-.39-.39-1.02-.39-1.41 0l-6.59 6.59c-.39.39-.39 1.02 0 1.41l6.59 6.59c.39.39 1.02.39 1.41 0 .39-.39.39-1.02 0-1.41L7.83 13H19c.55 0 1-.45 1-1s-.45-1-1-1z"/></svg>
        </button>
        <div class="exp-left">
          <div class="exp-album-art">
            <img id="expThumb" src="" alt="" />
          </div>
          <div class="exp-song-info">
            <div class="exp-title" id="expTitle"></div>
            <div class="exp-artist" id="expArtist"></div>
          </div>
          <div class="exp-controls">
            <button class="exp-btn" id="expPrev">
              <svg viewBox="0 0 24 24" width="28" height="28" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
            </button>
            <button class="exp-btn exp-play-btn" id="expPlayPause">
              <svg class="icon-play" viewBox="0 0 24 24" width="44" height="44" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
              <svg class="icon-pause" viewBox="0 0 24 24" width="44" height="44" fill="currentColor" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
            </button>
            <button class="exp-btn" id="expNext">
              <svg viewBox="0 0 24 24" width="28" height="28" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zm2-8.14 4.96 2.14L8 14.14V9.86zM16 6h2v12h-2z"/></svg>
            </button>
          </div>
          <div class="exp-progress">
            <span id="expCurrentTime">0:00</span>
            <div class="exp-progress-bar" id="expProgressBar">
              <div class="exp-progress-fill" id="expProgressFill"></div>
            </div>
            <span id="expTotalTime">0:00</span>
          </div>
        </div>
        <div class="exp-right" id="expRight">
          <div class="exp-tabs">
            <button class="exp-tab active" data-tab="queue">Queue</button>
            <button class="exp-tab" data-tab="related">Up Next</button>
            <button class="exp-tab" data-tab="lyrics">Lyrics</button>
          </div>
          <div id="expQueuePanel" class="exp-panel">
            <div id="expQueueList"></div>
          </div>
          <div id="expRelatedPanel" class="exp-panel" style="display:none">
            <div id="expRelatedList"></div>
          </div>
          <div id="expLyricsPanel" class="exp-panel" style="display:none">
            <div id="expLyricsText" class="lyrics-text"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- YouTube iframe (hidden) -->
    <div id="ytContainer" style="position:fixed;bottom:-9999px;left:-9999px;width:1px;height:1px;pointer-events:none;"></div>
  </div>

  <script src="/src/app.js"></script>
</body>
</html>
